apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 01-authentication-app
  namespace: openshift-gitops
spec:
  project: infra-ia
  source:
    repoURL: https://github.com/lyeschaya/infra-ia.git
    targetRevision: main
    path: gitops/01-authentication/base
  destination:
    server: https://kubernetes.default.svc
    namespace: app-demo
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: openshift-gitops