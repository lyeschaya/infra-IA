apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-projet
  namespace: openshift-gitops
spec:
  project: infra-IA
  source:
    repoURL: https://github.com/neutron-IT-organization/infra-IA.git
    targetRevision: main
    path: gitops/rag-projet/base
  destination:
    server: https://kubernetes.default.svc
    namespace: rag-projet
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: openshift-gitops